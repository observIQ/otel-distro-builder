# Minimal set of components required for Bindplane compatibility (BYOC).
# By default, all entries here are guaranteed to be present
# in the generated manifest even if the user's config does not reference it.
# Use --no-bindplane to exclude them.
# See: https://docs.bindplane.com/how-to-guides/bring-your-own-collector/using-an-opentelemetry-distribution-with-bindplane

# __BINDPLANE_VERSION__ is replaced at runtime with the appropriate version.
# __OTEL_VERSION__ is replaced at runtime with the OTel collector version (v0.x).
# Latest Bindplane collector version
version: "1.93.0"

connectors:
  - gomod: "go.opentelemetry.io/collector/connector/forwardconnector __OTEL_VERSION__"
  - gomod: "github.com/open-telemetry/opentelemetry-collector-contrib/connector/routingconnector __OTEL_VERSION__"
exporters:
  - gomod: "go.opentelemetry.io/collector/exporter/otlpexporter __OTEL_VERSION__"
  - gomod: "go.opentelemetry.io/collector/exporter/otlphttpexporter __OTEL_VERSION__"
  - gomod: "go.opentelemetry.io/collector/exporter/nopexporter __OTEL_VERSION__"
extensions:
  - gomod: "github.com/observiq/bindplane-otel-collector/extension/bindplaneextension __BINDPLANE_VERSION__"
  - gomod: "github.com/open-telemetry/opentelemetry-collector-contrib/extension/healthcheckextension __OTEL_VERSION__"
  - gomod: "github.com/open-telemetry/opentelemetry-collector-contrib/extension/opampextension __OTEL_VERSION__"
  - gomod: "github.com/open-telemetry/opentelemetry-collector-contrib/extension/storage/filestorage __OTEL_VERSION__"
processors:
  - gomod: "github.com/observiq/bindplane-otel-collector/processor/snapshotprocessor __BINDPLANE_VERSION__"
  - gomod: "github.com/open-telemetry/opentelemetry-collector-contrib/processor/metricstransformprocessor __OTEL_VERSION__"
  - gomod: "github.com/open-telemetry/opentelemetry-collector-contrib/processor/transformprocessor __OTEL_VERSION__"
  - gomod: "github.com/observiq/bindplane-otel-collector/processor/throughputmeasurementprocessor __BINDPLANE_VERSION__"
  - gomod: "github.com/open-telemetry/opentelemetry-collector-contrib/processor/resourcedetectionprocessor __OTEL_VERSION__"
receivers:
  - gomod: "github.com/open-telemetry/opentelemetry-collector-contrib/receiver/filelogreceiver __OTEL_VERSION__"
  - gomod: "github.com/open-telemetry/opentelemetry-collector-contrib/receiver/hostmetricsreceiver __OTEL_VERSION__"
  - gomod: "go.opentelemetry.io/collector/receiver/nopreceiver __OTEL_VERSION__"

# Additional replaces needed for Bindplane components
replaces:
  - github.com/observiq/bindplane-otel-collector/internal/version => github.com/observiq/bindplane-otel-collector/internal/version v0.0.0-20250306153219-6fe3f849c29f
