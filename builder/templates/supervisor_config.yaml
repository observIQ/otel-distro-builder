# ─── Bindplane example ───────────────────────────────────────────────
# To connect to Bindplane, replace the active `server` section below
# with the following (set your endpoint and secret key):
#
#   server:
#     endpoint: wss://app.bindplane.com/v1/opamp
#     headers:
#       Authorization: "Secret-Key YOUR_SECRET_KEY"
#     tls:
#       insecure: false
#       insecure_skip_verify: false
# ─────────────────────────────────────────────────────────────────────

# Default: local OpAMP server (change to Bindplane per above).
server:
  endpoint: wss://127.0.0.1:3001/v1/opamp

capabilities:
  accepts_remote_config: true
  reports_remote_config: true
  reports_available_components: true

agent:
  executable: /opt/__DISTRIBUTION__/__DISTRIBUTION__
  config_apply_timeout: 30s
  bootstrap_timeout: 5s

storage:
  directory: "/opt/__DISTRIBUTION__/supervisor_storage"

telemetry:
  logs:
    level: 0
    output_paths: ["/opt/__DISTRIBUTION__/supervisor.log"]
