dist:
  name: otelcol-contrib-bp
  description: OpenTelemetry Collector Contrib w/ Bindplane
  version: 0.1.0
  otelcol_version: 0.145.0
  output_path: ./_build

extensions:
  - gomod: github.com/observiq/bindplane-otel-collector/extension/bindplaneextension v1.91.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/extension/opampextension v0.145.0
  - gomod: go.opentelemetry.io/collector/extension/zpagesextension v0.145.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/extension/ackextension v0.145.0

exporters:
  - gomod: go.opentelemetry.io/collector/exporter/debugexporter v0.145.0
  - gomod: go.opentelemetry.io/collector/exporter/nopexporter v0.145.0
  - gomod: go.opentelemetry.io/collector/exporter/otlpexporter v0.145.0
  - gomod: go.opentelemetry.io/collector/exporter/otlphttpexporter v0.145.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/exporter/zipkinexporter v0.145.0

processors:
  - gomod: github.com/observiq/bindplane-otel-collector/processor/snapshotprocessor v1.91.0
  - gomod: github.com/observiq/bindplane-otel-collector/processor/throughputmeasurementprocessor v1.91.0
  - gomod: github.com/observiq/bindplane-otel-collector/processor/topologyprocessor v1.91.0
  - gomod: go.opentelemetry.io/collector/processor/batchprocessor v0.145.0
  - gomod: go.opentelemetry.io/collector/processor/memorylimiterprocessor v0.145.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/attributesprocessor v0.145.0

receivers:
  - gomod: go.opentelemetry.io/collector/receiver/nopreceiver v0.145.0
  - gomod: go.opentelemetry.io/collector/receiver/otlpreceiver v0.145.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/activedirectorydsreceiver v0.145.0

connectors:
  - gomod: go.opentelemetry.io/collector/connector/forwardconnector v0.145.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/connector/countconnector v0.145.0

providers:
  - gomod: go.opentelemetry.io/collector/confmap/provider/envprovider v0.145.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/confmap/provider/aesprovider v0.145.0

# When adding a replace, add a comment before it to document why it's needed and when it can be removed
replaces:
  # see https://github.com/openshift/api/pull/1515
  - github.com/openshift/api => github.com/openshift/api v0.0.0-20230726162818-81f778f3b3ec
